<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fallbuild-sdk — playground</title>
<style>
:root{--void:#0b0a0f;--ink:#1a1922;--ink2:#22212c;--line:#2a2934;--cream:#e6e1d6;--muted:#a8a395;--brass:#b8974a;--amber:#ff8c00}
*{box-sizing:border-box}
body{margin:0;background:var(--void);color:var(--cream);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5}
header{padding:16px 24px;border-bottom:1px solid var(--line);background:#13121a;display:flex;align-items:center;gap:12px}
header h1{font-family:Georgia,serif;font-size:20px;margin:0;color:var(--cream)}
header .tag{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted);letter-spacing:.05em}
.wrap{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 57px)}
.sidebar{background:#13121a;border-right:1px solid var(--line);padding:16px;overflow-y:auto}
.sidebar h3{font-family:Georgia,serif;font-size:13px;color:var(--brass);margin:0 0 8px;text-transform:uppercase;letter-spacing:.1em}
.tmpl{display:block;width:100%;text-align:left;background:var(--ink);border:1px solid var(--line);color:var(--cream);padding:10px 12px;border-radius:4px;margin-bottom:6px;cursor:pointer;font:inherit}
.tmpl:hover{border-color:var(--brass);background:var(--ink2)}
.tmpl.on{border-color:var(--amber);background:var(--ink2)}
.tmpl small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.actions{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.btn{background:var(--brass);color:var(--void);border:none;padding:10px 12px;border-radius:4px;cursor:pointer;font:inherit;font-weight:600}
.btn:hover{background:var(--amber)}
.btn.sec{background:var(--ink);color:var(--cream);border:1px solid var(--line);font-weight:400}
.main{display:grid;grid-template-rows:auto 1fr;overflow:hidden}
.tabs{border-bottom:1px solid var(--line);background:#13121a;padding:0 16px;display:flex;gap:4px}
.tab{background:none;border:none;color:var(--muted);padding:12px 14px;cursor:pointer;font:inherit;border-bottom:2px solid transparent}
.tab.on{color:var(--cream);border-color:var(--brass)}
.pane{overflow:auto;height:100%}
#jsonView{width:100%;height:100%;border:none;background:#0f0e15;color:#c9c4b6;padding:16px;font-family:ui-monospace,Menlo,monospace;font-size:12px;resize:none;outline:none}
#previewFrame{width:100%;height:100%;border:none;background:#fff}
.note{padding:12px 16px;background:rgba(184,151,74,.08);border:1px solid var(--line);border-radius:4px;font-size:12px;color:var(--muted);margin-top:16px}
.note code{background:var(--ink);padding:1px 6px;border-radius:3px;color:var(--brass);font-family:ui-monospace,Menlo,monospace;font-size:11px}
</style>
</head>
<body>
<header>
  <h1>fallbuild-sdk</h1>
  <span class="tag">playground v1.0.0 · MIT · ai-nativesolutions.com</span>
</header>
<div class="wrap">
  <aside class="sidebar">
    <h3>Templates</h3>
    <button class="tmpl on" data-t="CRUD app">CRUD app<small>list · new · edit + customers demo</small></button>
    <button class="tmpl" data-t="Dashboard">Dashboard<small>bar · pie · line charts</small></button>
    <button class="tmpl" data-t="Lead capture">Lead capture<small>form + thank-you page</small></button>
    <button class="tmpl" data-t="Pricing calculator">Pricing calculator<small>inputs + custom JS action</small></button>
    <button class="tmpl" data-t="Internal tool">Internal tool<small>3 tables sidebar-style</small></button>

    <div class="actions">
      <button class="btn" id="preview">Preview -&gt;</button>
      <button class="btn sec" id="download">Download HTML</button>
      <button class="btn sec" id="copyJson">Copy JSON</button>
    </div>

    <div class="note">
      Everything runs in your browser — no server, no analytics. The SDK is loaded from <code>../src/index.js</code> as an ES module.
    </div>
  </aside>
  <section class="main">
    <div class="tabs">
      <button class="tab on" data-p="json">JSON</button>
      <button class="tab" data-p="preview">Preview</button>
    </div>
    <div class="pane" id="pane-json"><textarea id="jsonView" spellcheck="false"></textarea></div>
    <div class="pane" id="pane-preview" style="display:none"><iframe id="previewFrame"></iframe></div>
  </section>
</div>
<script type="module">
import fb from '../src/index.js';

let current = fb.applyTemplate('CRUD app');
const json = document.getElementById('jsonView');
const frame = document.getElementById('previewFrame');

function renderJson() { json.value = JSON.stringify(current, null, 2); }
function renderPreview() {
  try { const app = JSON.parse(json.value); current = app; } catch (e) { alert('invalid JSON: ' + e.message); return; }
  const html = fb.renderStandaloneHtml(current);
  frame.srcdoc = html;
}

document.querySelectorAll('.tmpl').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tmpl').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    current = fb.applyTemplate(btn.dataset.t);
    renderJson();
  };
});

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    const p = t.dataset.p;
    document.getElementById('pane-json').style.display = p === 'json' ? '' : 'none';
    document.getElementById('pane-preview').style.display = p === 'preview' ? '' : 'none';
    if (p === 'preview') renderPreview();
  };
});

document.getElementById('preview').onclick = () => {
  document.querySelector('.tab[data-p="preview"]').click();
};

document.getElementById('download').onclick = () => {
  try { current = JSON.parse(json.value); } catch (e) { alert('invalid JSON: ' + e.message); return; }
  const html = fb.renderStandaloneHtml(current);
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (current.name || 'app').replace(/\s+/g, '-') + '.html';
  a.click();
};

document.getElementById('copyJson').onclick = () => {
  navigator.clipboard.writeText(json.value).then(() => {
    const b = document.getElementById('copyJson');
    const t = b.textContent; b.textContent = 'Copied!';
    setTimeout(() => b.textContent = t, 1200);
  });
};

renderJson();
</script>
</body>
</html>
